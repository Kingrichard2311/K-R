====================================================================== */
const T = {
  bg:"#0A1728", bgPanel:"#0F2038", bgPanelAlt:"#13253F",

function bandForScore(score){
  if(score<=30) return {label:"Low", color:T.low};
  if(score<=60) return {label:"Moderate", color:T.moderate};
  if(score<=80) return {label:"High", color:T.high};
  return {label:"Critical", color:T.critical};
}

====================================================================== */

  { name:"Journalism & Media",              sectorRisk:12, incidentProb:0.020, avgRansomBase:300000,  avgCaptivityDays:75, travelExposure:8 },
  { name:"Diplomatic & Government Contractors", sectorRisk:13, incidentProb:0.022, avgRansomBase:400000, avgCaptivityDays:40, travelExposure:8 },
  { name:"Engineering & Field Infrastructure", sectorRisk:11, incidentProb:0.018, avgRansomBase:500000, avgCaptivityDays:30, travelExposure:7 },
  { name:"Financial Services (Exec Travel)", sectorRisk:8,  incidentProb:0.006, avgRansomBase:1000000, avgCaptivityDays:14, travelExposure:4 },
  { name:"Technology & Telecoms (Emerging Mkts)", sectorRisk:9, incidentProb:0.010, avgRansomBase:350000, avgCaptivityDays:21, travelExposure:5 },

/* ======================================================================
   GEOGRAPHIC HOTSPOTS — illustrative/synthetic only, tied to SECTORS above.
   Coordinates are approximate regional centroids for visualisation, not
   precise incident locations.
====================================================================== */
const GEO_HOTSPOTS = [

  { name:"Ouagadougou, Burkina Faso", lat:12.4, lon:-1.5, sector:"Engineering & Field Infrastructure", note:"Infrastructure projects operating amid regional insurgent activity." },
  { name:"Katanga, DRC", lat:-11.7, lon:27.5, sector:"Engineering & Field Infrastructure", note:"Remote field engineering sites with limited security infrastructure." },
  { name:"PNG Highlands", lat:-5.5, lon:144.0, sector:"Engineering & Field Infrastructure", note:"Resource-project field teams exposed to tribal and criminal conflict." },
  { name:"Mexico City, Mexico", lat:19.4, lon:-99.1, sector:"Financial Services (Exec Travel)", note:"Express kidnapping risk to visiting and resident executives." },
  { name:"Johannesburg, South Africa", lat:-26.2, lon:28.0, sector:"Financial Services (Exec Travel)", note:"Elevated urban crime risk affecting executive travel security." },
  { name:"Caracas, Venezuela", lat:10.5, lon:-66.9, sector:"Financial Services (Exec Travel)", note:"Economic instability correlated with rising extortion incidents." },
  { name:"Lagos, Nigeria", lat:6.5, lon:3.4, sector:"Technology & Telecoms (Emerging Mkts)", note:"Rapidly growing tech hub with uneven urban security coverage." },

function geoIntensity(sectorName){
  const s = SECTORS.find(x=>x.name===sectorName);
  if(!s) return 50;
  return Math.max(5, Math.min(100, Math.round(s.incidentProb*1400 + s.travelExposure*3)));
}

const LIMIT_BANDS = [
  { label:"Up to £1m",  base:3000,  mult:0.4 },
  { label:"£1m–£5m",    base:8000,  mult:1 },
  { label:"£5m–£15m",   base:20000, mult:2.5 },
  { label:"£15m+",      base:55000, mult:6 },
];

const WEIGHTS = {
  protectionDetail:0.15, crisisResponse:0.10, heat:0.10, travelTracking:0.10,
  priorIncidents:0.20, sectorRisk:0.15, travelFrequency:0.10, regionInstability:0.10,
};

/* ======================================================================
   SCORING ENGINE
====================================================================== */
function computeScore({protectionDetail, crisisResponse, heat, travelTracking, priorIncidents, sectorRisk, travelFrequency, regionInstability}){
  const protectionSub = protectionDetail ? 0 : 100;
  const crisisSub = crisisResponse ? 0 : 100;
  const heatSub = heat==="Yes" ? 0 : heat==="Partial" ? 50 : 100;
  const trackingSub = travelTracking ? 0 : 100;
  const incidentSub = priorIncidents===0 ? 0 : priorIncidents===1 ? 60 : 100;
  const sectorSub = (sectorRisk/15)*100;
  const freqSub = (travelFrequency/10)*100;
  const instabilitySub = (regionInstability/10)*100;
  const raw = WEIGHTS.protectionDetail*protectionSub + WEIGHTS.crisisResponse*crisisSub + WEIGHTS.heat*heatSub +
    WEIGHTS.travelTracking*trackingSub + WEIGHTS.priorIncidents*incidentSub + WEIGHTS.sectorRisk*sectorSub +
    WEIGHTS.travelFrequency*freqSub + WEIGHTS.regionInstability*instabilitySub;
  return Math.round(raw);
}
function computePremium(score, bandMult){ return Math.round(bandMult*(2200+320*score)); }
function computeRetention(score, bandLabel){
  const bandBase = {"Up to £1m":5000,"£1m–£5m":15000,"£5m–£15m":50000,"£15m+":150000}[bandLabel];
  const band = bandForScore(score).label;
  const mult = {Low:1, Moderate:1.5, High:2.5, Critical:4}[band];
  return Math.round(bandBase*mult);
}
function fmtGBP(n){ return "£" + Math.round(n).toLocaleString("en-GB"); }

/* ======================================================================
   SYNTHETIC PORTFOLIO (seeded)
====================================================================== */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed>>>15), 1 | seed);
    t = (t + Math.imul(t ^ (t>>>7), 61 | t)) ^ t;
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  };
}
function buildPortfolio(){
  const rand = mulberry32(41203);
  const policies = [];
  for(let i=0;i<100;i++){
    const sector = SECTORS[Math.floor(rand()*SECTORS.length)];
    const band = LIMIT_BANDS[Math.floor(rand()*LIMIT_BANDS.length)];
    const protectionDetail = rand()<0.45;
    const crisisResponse = rand()<0.55;
    const hRoll = rand();
    const heat = hRoll<0.30 ? "No" : hRoll<0.60 ? "Partial" : "Yes";
    const travelTracking = rand()<0.50;
    const iRoll = rand();
    const priorIncidents = iRoll<0.85 ? 0 : iRoll<0.96 ? 1 : 2;
    const travelFrequency = Math.floor(rand()*11);
    const regionInstability = Math.floor(rand()*11);
    const score = computeScore({protectionDetail, crisisResponse, heat, travelTracking, priorIncidents,
      sectorRisk:sector.sectorRisk, travelFrequency, regionInstability});
    const premium = computePremium(score, band.mult);
    const claimProb = Math.min(0.35, (score/100)*sector.incidentProb*1.5);
    const hadClaim = rand()<claimProb;
    const severity = hadClaim ? Math.round(sector.avgRansomBase*(0.4+(score/100)*1.3)*(0.6+rand()*0.8)) : 0;
    policies.push({ id:i+1, sector:sector.name, band:band.label, protectionDetail, crisisResponse, heat,
      travelTracking, priorIncidents, travelFrequency, regionInstability, score, premium, hadClaim, severity });
  }
  return policies;
}

function heatColor(value, min, max){
  const t = max>min ? (value-min)/(max-min) : 0;
  const stops = [[76,154,106],[214,165,55],[217,122,52],[192,71,63]];
  const idx = Math.min(stops.length-2, Math.floor(t*(stops.length-1)));
  const localT = t*(stops.length-1) - idx;
  const c1 = stops[idx], c2 = stops[idx+1];
  const c = c1.map((v,i)=>Math.round(v+(c2[i]-v)*localT));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function icon(name, size=14, color="currentColor", extraStyle=""){
  const body = ICONS[name] || "";
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;${extraStyle}">${body}</svg>`;

/* ======================================================================
   RISK GAUGE (SVG)
====================================================================== */
function riskGaugeSVG(score){
  const band = bandForScore(score);
  const angle = -90 + (score/100)*180;
  const r = 70, cx = 90, cy = 90;
  const toXY = (deg)=>{ const rad = deg*Math.PI/180; return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)]; };
  const segs = [
    {from:-90, to:-36, color:T.low}, {from:-36, to:18, color:T.moderate},
    {from:18, to:54, color:T.high}, {from:54, to:90, color:T.critical},
  ];
  const arcPath = (from,to)=>{ const [x1,y1]=toXY(from), [x2,y2]=toXY(to); return `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`; };
  const [nx, ny] = toXY(angle);
  const arcs = segs.map(s=>`<path d="${arcPath(s.from,s.to)}" stroke="${s.color}" stroke-width="10" fill="none" opacity="0.85"/>`).join("");
  return `
  <div style="display:flex;flex-direction:column;align-items:center;">
    <svg width="180" height="112" viewBox="0 0 180 112">
      ${arcs}
      <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${T.goldBright}" stroke-width="2.5"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="${T.goldBright}"/>
    </svg>
    <div style="font-family:var(--mono);font-size:28px;font-weight:600;margin-top:-8px;color:${band.color};">${score}</div>
    <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px;color:${band.color};">${band.label} Risk</div>
  </div>`;
}

function deltaPillHTML(value, reference, goodDirection="down", decimals=0){
  const diff = value - reference;
  const pct = reference !== 0 ? (diff/reference)*100 : 0;
  const flat = Math.abs(diff) < 0.5;
  const better = goodDirection==="down" ? diff<0 : diff>0;
  const color = flat ? T.textFaint : better ? T.low : T.critical;
  const ic = flat ? "minus" : diff>0 ? "trend-up" : "trend-down";
  const txt = flat ? "on par" : `${diff>0?"+":""}${pct.toFixed(decimals)}%`;
  return `<span class="pill" style="color:${color};">${icon(ic,12,color)}${txt}</span>`;
}

function trafficLightHTML(level){
  const color = level==="Low" ? T.low : level==="Moderate" ? T.moderate : T.critical;
  return `<span class="traffic" style="color:${color};"><span class="dot" style="background:${color};"></span>${level} Exposure</span>`;
}

function computeAgg(portfolio){
  const n = portfolio.length;
  const avgScore = portfolio.reduce((a,c)=>a+c.score,0)/n;
  const avgPremium = portfolio.reduce((a,c)=>a+c.premium,0)/n;
  const claimsCos = portfolio.filter(c=>c.hadClaim);
  const totalPremium = portfolio.reduce((a,c)=>a+c.premium,0);
  const totalIncurred = claimsCos.reduce((a,c)=>a+c.severity,0);
  const lossRatio = totalPremium ? totalIncurred/totalPremium : 0;
  const avgIncidentCost = claimsCos.length ? claimsCos.reduce((a,c)=>a+c.severity,0)/claimsCos.length : 0;

  const bySector = SECTORS.map(s=>{
    const cos = portfolio.filter(c=>c.sector===s.name);
    const avgS = cos.length ? cos.reduce((a,c)=>a+c.score,0)/cos.length : 0;
    const avgP = cos.length ? cos.reduce((a,c)=>a+c.premium,0)/cos.length : 0;
    const claims = cos.filter(c=>c.hadClaim);
    const freq = cos.length ? claims.length/cos.length : 0;
    const sev = claims.length ? claims.reduce((a,c)=>a+c.severity,0)/claims.length : 0;
    return { sector:s.name, avgScore:Math.round(avgS), avgScoreExact:avgS, avgPremium:avgP, freq, sev, count:cos.length, incidentProb:s.incidentProb };
  }).sort((a,b)=>b.avgScore-a.avgScore);

  const vulnCounts = [
    { label:"No Protection Detail", count:portfolio.filter(c=>!c.protectionDetail).length },
    { label:"No Crisis Response Retainer", count:portfolio.filter(c=>!c.crisisResponse).length },
    { label:"No HEAT Training", count:portfolio.filter(c=>c.heat!=="Yes").length },
    { label:"No Travel Tracking", count:portfolio.filter(c=>!c.travelTracking).length },
    { label:"Prior Incident(s)", count:portfolio.filter(c=>c.priorIncidents>0).length },
    { label:"High Travel Frequency", count:portfolio.filter(c=>c.travelFrequency>=6).length },
  ].sort((a,b)=>b.count-a.count);

  const bandCounts = ["Low","Moderate","High","Critical"].map(label=>({
    label, count: portfolio.filter(c=>bandForScore(c.score).label===label).length,
    color: {Low:T.low, Moderate:T.moderate, High:T.high, Critical:T.critical}[label],
  }));

  return { avgScore, avgPremium, avgIncidentCost, bySector, vulnCounts, bandCounts, totalClaims:claimsCos.length, lossRatio, totalPremium };
}

function projectPoint(lon, lat, width, height){
  const x = (lon + 180) / 360 * width;
  const y = (90 - lat) / 180 * height;
  return [x, y];
}

function landmassPathD(points, width, height){
  return points.map((p, i)=>{
    const [x, y] = projectPoint(p[0], p[1], width, height);
    return (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ") + " Z";
}

function initGeoMap(){
  const svgEl = document.getElementById("geo-svg");
  if(!svgEl) return;
  const width = 960, height = 500;
  const NS = "http://www.w3.org/2000/svg";

  while(svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

  // graticule (lightweight, every 30deg)
  const gratG = document.createElementNS(NS, "g");
  for(let lon=-180; lon<=180; lon+=30){
    const [x1] = projectPoint(lon, 90, width, height);
    const line = document.createElementNS(NS, "line");
    line.setAttribute("x1", x1); line.setAttribute("y1", 0);
    line.setAttribute("x2", x1); line.setAttribute("y2", height);
    line.setAttribute("stroke", T.lineSoft); line.setAttribute("stroke-width", 0.4); line.setAttribute("opacity", 0.35);
    gratG.appendChild(line);
  }
  for(let lat=-60; lat<=60; lat+=30){
    const [,y1] = projectPoint(0, lat, width, height);
    const line = document.createElementNS(NS, "line");
    line.setAttribute("x1", 0); line.setAttribute("y1", y1);
    line.setAttribute("x2", width); line.setAttribute("y2", y1);
    line.setAttribute("stroke", T.lineSoft); line.setAttribute("stroke-width", 0.4); line.setAttribute("opacity", 0.35);
    gratG.appendChild(line);
  }
  svgEl.appendChild(gratG);

  // landmasses
  const landG = document.createElementNS(NS, "g");
  GEO_LANDMASSES.forEach(points=>{
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", landmassPathD(points, width, height));
    path.setAttribute("fill", T.bgPanelAlt);
    path.setAttribute("stroke", T.line);
    path.setAttribute("stroke-width", 0.8);
    path.setAttribute("stroke-linejoin", "round");
    landG.appendChild(path);
  });
  svgEl.appendChild(landG);

  // hotspot markers
  const markerG = document.createElementNS(NS, "g");
  const tooltip = document.getElementById("geo-tooltip");
  const wrap = document.getElementById("geo-map-wrap");

  GEO_HOTSPOTS.forEach((h, i)=>{
    const [x, y] = projectPoint(h.lon, h.lat, width, height);
    const inten = geoIntensity(h.sector);
    const band = bandForScore(inten);
    const r = 3 + (inten/100)*5;

    const ring = document.createElementNS(NS, "circle");
    ring.setAttribute("cx", x); ring.setAttribute("cy", y); ring.setAttribute("r", r);
    ring.setAttribute("fill", "none"); ring.setAttribute("stroke", band.color); ring.setAttribute("stroke-width", 1.4);
    ring.setAttribute("class", "geo-pulse-ring");
    ring.style.animationDelay = (i*0.3) + "s";
    markerG.appendChild(ring);

    const dot = document.createElementNS(NS, "circle");
    dot.setAttribute("cx", x); dot.setAttribute("cy", y); dot.setAttribute("r", r*0.55);
    dot.setAttribute("fill", band.color); dot.setAttribute("stroke", T.bg); dot.setAttribute("stroke-width", 0.8);
    dot.setAttribute("class", "geo-marker-dot");
    dot.style.animationDelay = (i*0.3) + "s";
    dot.style.cursor = "pointer";
    dot.addEventListener("mouseenter", ()=>{
      tooltip.style.opacity = 1;
      tooltip.innerHTML = `<strong>${h.name}</strong><br><span style="color:${T.textMuted}">${h.sector}</span><br>${h.note}<br><span style="color:${band.color};font-weight:600;">${band.label} exposure</span>`;
    });
    dot.addEventListener("mousemove", (event)=>{
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = Math.min(rect.width - 230, event.clientX - rect.left + 14) + "px";
      tooltip.style.top = (event.clientY - rect.top + 10) + "px";
    });
    dot.addEventListener("mouseleave", ()=>{ tooltip.style.opacity = 0; });
    markerG.appendChild(dot);
  });
  svgEl.appendChild(markerG);
}

function startGeoFeed(){
  if(geoLogInterval) clearInterval(geoLogInterval);
  const feedEl = document.getElementById("geo-feed");
  const verbs = [
    "Elevated chatter noted near", "Advisory review flagged", "Pattern-of-life shift observed near",
    "Local reporting referenced activity near", "Routine monitoring update for", "Travel advisory level unchanged for",
    "Security posture reassessed for",
  ];
  let tSec = 0;
  function pushEntry(){
    const el = document.getElementById("geo-feed");
    if(!el){ clearInterval(geoLogInterval); geoLogInterval = null; return; }
    const h = GEO_HOTSPOTS[Math.floor(Math.random()*GEO_HOTSPOTS.length)];
    const band = bandForScore(geoIntensity(h.sector));
    const verb = verbs[Math.floor(Math.random()*verbs.length)];
    tSec += Math.floor(Math.random()*40) + 10;
    const row = document.createElement("div");
    row.className = "minirow geo-feed-row";
    row.style.fontSize = "11px";
    row.innerHTML = `<span style="display:flex;align-items:center;gap:6px;">
        <span class="geo-dot" style="background:${band.color}"></span>
        ${verb} <strong style="margin:0 3px;color:${T.text};">${h.name}</strong>
        <span class="faint">(${h.sector})</span>
      </span>
      <span class="mono faint" style="flex-shrink:0;">T-${tSec}s</span>`;
    el.prepend(row);
    while(el.children.length > 12) el.removeChild(el.lastChild);
  }
  pushEntry();
  geoLogInterval = setInterval(pushEntry, 2600);
}

   A drifting intelligence-network of nodes and connecting lines that
   brightens and reorients near the cursor — a quiet nod to signal
   tracking / surveillance-network themes of the dashboard.
====================================================================== */
(function backgroundNetwork(){
  const canvas = document.getElementById("bg-canvas");
  const ctx = canvas.getContext("2d");
  let w, h, dpr;
  let nodes = [];
  let pulses = [];
  const mouse = { x:-9999, y:-9999, active:false };
  let t = 0;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth; h = window.innerHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    canvas.style.width = w+"px"; canvas.style.height = h+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const count = Math.max(32, Math.min(80, Math.round((w*h)/22000)));
    nodes = Array.from({length:count}, ()=>({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
      r: 1 + Math.random()*1.6,
      phase: Math.random()*Math.PI*2,
      wspeed: 0.0004 + Math.random()*0.0006,
      pulsePhase: Math.random()*Math.PI*2,
    }));
    pulses = [];
  }
  window.addEventListener("resize", resize);
  window.addEventListener("mousemove", (e)=>{ mouse.x=e.clientX; mouse.y=e.clientY; mouse.active=true; });
  window.addEventListener("mouseleave", ()=>{ mouse.active=false; });
  window.addEventListener("touchmove", (e)=>{ if(e.touches[0]){ mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY; mouse.active=true; } }, {passive:true});
  window.addEventListener("touchend", ()=>{ mouse.active=false; });

  const LINK_DIST = 155;
  const MOUSE_DIST = 220;

  function step(){
    t += 1;

    for(const n of nodes){
      // perpetual organic wander — a slowly-rotating force that never
      // fully decays, so the field is always drifting even at rest
      n.phase += n.wspeed;
      n.vx += Math.cos(n.phase) * 0.006;
      n.vy += Math.sin(n.phase*1.3) * 0.006;

      if(mouse.active){
        const dx = n.x - mouse.x, dy = n.y - mouse.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < MOUSE_DIST && dist > 0.01){
          const strength = 1 - dist/MOUSE_DIST;
          // gentle pull inward
          const pull = strength * 0.05;
          n.vx -= (dx/dist)*pull;
          n.vy -= (dy/dist)*pull;
          // tangential swirl around the cursor for a lively orbit feel
          const swirl = strength * 0.09;
          n.vx += (-dy/dist)*swirl;
          n.vy += (dx/dist)*swirl;
        }
      }

      // soft damping keeps speed bounded without ever fully stopping
      n.vx *= 0.978; n.vy *= 0.978;
      const speed = Math.sqrt(n.vx*n.vx+n.vy*n.vy);
      const maxSpeed = 0.9;
      if(speed > maxSpeed){ n.vx = (n.vx/speed)*maxSpeed; n.vy = (n.vy/speed)*maxSpeed; }

      n.x += n.vx; n.y += n.vy;
      if(n.x < -20) n.x = w+20; if(n.x > w+20) n.x = -20;
      if(n.y < -20) n.y = h+20; if(n.y > h+20) n.y = -20;
    }

    // occasionally launch a signal pulse along a currently-live connection
    if(Math.random() < 0.045 && nodes.length > 1){
      const a = nodes[Math.floor(Math.random()*nodes.length)];
      let best = null, bestDist = LINK_DIST;
      for(const b of nodes){
        if(b===a) continue;
        const d = Math.hypot(a.x-b.x, a.y-b.y);
        if(d < bestDist){ bestDist = d; best = b; }
      }
      if(best) pulses.push({ a, b:best, u:0, speed: 0.012 + Math.random()*0.012 });
    }
    pulses.forEach(p=>p.u += p.speed);
    pulses = pulses.filter(p=>p.u < 1);
  }

  function draw(){
    ctx.clearRect(0,0,w,h);

    // ambient slow-orbiting scan glow — keeps the field alive even
    // when the cursor is idle or off-screen
    const orbitR = Math.min(w,h) * 0.32;
    const ox = w/2 + Math.cos(t*0.0016) * orbitR;
    const oy = h/2 + Math.sin(t*0.0021) * orbitR * 0.7;
    const ambient = ctx.createRadialGradient(ox, oy, 0, ox, oy, 320);
    ambient.addColorStop(0, "rgba(201,162,75,0.055)");
    ambient.addColorStop(1, "rgba(201,162,75,0)");
    ctx.fillStyle = ambient;
    ctx.fillRect(0,0,w,h);

    // cursor glow
    if(mouse.active){
      const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 260);
      grad.addColorStop(0, "rgba(201,162,75,0.12)");
      grad.addColorStop(1, "rgba(201,162,75,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,w,h);
    }

    // connections
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a = nodes[i], b = nodes[j];
        const dx = a.x-b.x, dy = a.y-b.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < LINK_DIST){
          const nearMouseA = mouse.active ? Math.max(0, 1 - Math.hypot(a.x-mouse.x, a.y-mouse.y)/260) : 0;
          const nearMouseB = mouse.active ? Math.max(0, 1 - Math.hypot(b.x-mouse.x, b.y-mouse.y)/260) : 0;
          const glow = Math.max(nearMouseA, nearMouseB);
          const shimmer = 0.85 + 0.15*Math.sin(t*0.03 + i*0.7 + j*0.3);
          const baseAlpha = (1 - dist/LINK_DIST) * 0.17 * shimmer;
          const alpha = baseAlpha + glow*0.30;
          ctx.strokeStyle = glow > 0.05
            ? `rgba(232,200,119,${Math.min(0.5, alpha)})`
            : `rgba(143,162,189,${Math.min(0.35, alpha)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
          ctx.stroke();
        }
      }
    }

    // traveling signal pulses along live connections
    for(const p of pulses){
      const x = p.a.x + (p.b.x-p.a.x)*p.u;
      const y = p.a.y + (p.b.y-p.a.y)*p.u;
      const fade = Math.sin(Math.PI * p.u); // fades in and out along the path
      ctx.beginPath();
      ctx.arc(x, y, 1.8, 0, Math.PI*2);
      ctx.fillStyle = `rgba(232,200,119,${0.7*fade})`;
      ctx.fill();
    }

    // nodes — gentle breathing pulse so they never look frozen
    for(const n of nodes){
      const nearMouse = mouse.active ? Math.max(0, 1 - Math.hypot(n.x-mouse.x, n.y-mouse.y)/260) : 0;
      const breathe = 1 + 0.25*Math.sin(t*0.045 + n.pulsePhase);
      ctx.beginPath();
      ctx.arc(n.x, n.y, (n.r*breathe) + nearMouse*1.5, 0, Math.PI*2);
      ctx.fillStyle = nearMouse > 0.05 ? `rgba(232,200,119,${0.5+nearMouse*0.5})` : "rgba(143,162,189,0.5)";
      ctx.fill();
    }
  }

  function loop(){
    step(); draw();
    requestAnimationFrame(loop);
  }

  resize();
  loop();
})();
</script>
</body>
</html>
