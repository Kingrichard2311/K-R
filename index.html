<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Kidnap &amp; Ransom Exposure &amp; Underwriting Intelligence</title>

<style>
  :root{
    --bg:#0A1728; --bgPanel:#0F2038; --bgPanelAlt:#13253F;
    --line:#233A57; --lineSoft:#1A2E4A;
    --gold:#C9A24B; --goldBright:#E8C877; --goldDim:#8A7238;
    --text:#EDE8DA; --textMuted:#8FA2BD; --textFaint:#5C7091;

    --body: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--body);
    min-height:100vh; position:relative; overflow-x:hidden;
  }
  #bg-canvas{
    position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none;
  }
  .app{ position:relative; z-index:1; }
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  select, input{font-family:inherit;}
  ::selection{ background: rgba(201,162,75,0.35); }

  .header{ padding:20px 16px 12px; border-bottom:1px solid var(--line); background:rgba(10,23,40,0.55); backdrop-filter: blur(2px); }
  .header-inner, .content, .tabs-inner{ max-width:1152px; margin:0 auto; width:100%; }
  .eyebrow-top{ display:flex; align-items:center; gap:8px; margin-bottom:2px; }
  .eyebrow-top span{ font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold); }
  h1{ font-family:var(--display); font-size:22px; font-weight:600; margin:2px 0 0; color:var(--text); }
  .subtitle{ font-size:12px; color:var(--textMuted); margin-top:6px; }

  .tabs{ position:sticky; top:0; z-index:10; display:flex; gap:4px; padding:8px 12px; overflow-x:auto;
    border-bottom:1px solid var(--line); background:rgba(10,23,40,0.92); backdrop-filter: blur(6px); }
  .tabs-inner{ display:flex; gap:4px; }
  .tab-btn{ white-space:nowrap; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:500;
    background:transparent; color:var(--textMuted); border:1px solid transparent; transition:.15s; }
  .tab-btn.active{ background:rgba(201,162,75,0.14); color:var(--goldBright); border-color:var(--goldDim); }
  .tab-btn:hover:not(.active){ color:var(--text); }

  .content{ padding:16px 12px; display:flex; flex-direction:column; gap:12px; }
  @media(min-width:768px){ .content{ padding:20px; } }

  .card{ border-radius:10px; padding:16px; background:var(--bgPanel); border:1px solid var(--line); }
  .eyebrow{ font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
  .muted{ color:var(--textMuted); }
  .faint{ color:var(--textFaint); }
  .mono{ font-family:var(--mono); }

  .grid{ display:grid; gap:8px; }
  .grid-kpi{ grid-template-columns:repeat(2,1fr); }
  @media(min-width:1024px){ .grid-kpi{ grid-template-columns:repeat(5,1fr); } }
  .grid-2{ grid-template-columns:1fr; gap:12px; }
  @media(min-width:768px){ .grid-2{ grid-template-columns:1fr 1fr; } }
  .grid-3{ grid-template-columns:1fr; gap:8px; }
  @media(min-width:640px){ .grid-3{ grid-template-columns:repeat(3,1fr); } }
  .grid-6{ grid-template-columns:repeat(2,1fr); gap:8px; }
  @media(min-width:640px){ .grid-6{ grid-template-columns:repeat(3,1fr); } }

  .kpi-value{ font-family:var(--mono); font-size:22px; font-weight:600; }
  .kpi-sub{ font-size:11px; color:var(--textMuted); margin-top:4px; }

  .toggle{ width:100%; display:flex; align-items:center; justify-content:space-between; border-radius:6px;
    padding:10px 12px; background:var(--bgPanelAlt); border:1px solid var(--line); transition:.15s; }
  .toggle.on{ background:rgba(201,162,75,0.10); border-color:var(--goldDim); }
  .toggle .label{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text); }
  .toggle .state{ font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; padding:2px 8px; border-radius:4px; color:var(--textFaint); }
  .toggle.on .state{ color:var(--gold); background:rgba(201,162,75,0.15); }

  select, .input{ width:100%; margin-top:4px; font-size:13px; border-radius:6px; padding:7px 8px;
    background:var(--bgPanelAlt); border:1px solid var(--line); color:var(--text); }

  input[type=range]{ width:100%; accent-color:var(--gold); }

  .btn-ghost{ display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:4px 8px; border-radius:6px;

  td{ padding:6px 8px; }
  tbody tr{ border-bottom:1px solid var(--lineSoft); cursor:pointer; transition:.1s; }
  tbody tr:hover{ background:rgba(201,162,75,0.06); }
  tbody tr.selected{ background:rgba(201,162,75,0.10); }
  .table-wrap{ overflow-x:auto; }

  .search-wrap{ position:relative; flex:1; min-width:160px; }
  .search-wrap svg{ position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--textFaint); }
  .search-wrap input{ width:100%; padding-left:28px; }
  .filters{ display:flex; flex-wrap:wrap; gap:8px; }

  .minirow{ display:flex; align-items:center; justify-content:space-between; gap:8px; border-radius:6px;
    padding:8px 12px; background:var(--bgPanelAlt); border:1px solid var(--line); font-size:13px; }

  .ministat{ border-radius:6px; padding:10px; background:var(--bgPanelAlt); border:1px solid var(--line); }
  .ministat .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:.03em; color:var(--textFaint); }
  .ministat .val{ font-size:14px; font-weight:600; font-family:var(--mono); margin-top:2px; }

  .rec-list{ display:flex; flex-direction:column; gap:6px; margin:6px 0 0; padding:0; list-style:none; }
  .rec-list li{ display:flex; gap:8px; font-size:13px; }
  .rec-list svg{ margin-top:3px; flex-shrink:0; }

  .heat-table td{ text-align:center; color:#0A1728; font-family:var(--mono); font-weight:600; border-radius:4px; padding:6px 4px; }
  .heat-table th{ font-size:11px; padding-bottom:4px; }
  .heat-table{ border-collapse:separate; border-spacing:3px; }

  .threat-card .stat-label{ font-size:10px; text-transform:uppercase; letter-spacing:.03em; color:var(--textFaint);
    display:flex; align-items:center; justify-content:center; gap:4px; }
  .threat-card .stat-value{ font-size:14px; font-weight:600; font-family:var(--mono); margin-top:2px; }
  .bar-track{ width:100%; height:6px; border-radius:999px; background:var(--lineSoft); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:999px; background:var(--gold); }

  .chart-box{ width:100%; }
  canvas.chart-canvas{ max-width:100%; }

  .traffic{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; }
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }

  ::-webkit-scrollbar{ height:8px; width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
</style>

<canvas id="bg-canvas"></canvas>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="eyebrow-top">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A24B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5z"/><path d="m9 12 2 2 4-4"/></svg>
        <span>Special Risks &amp; Crisis Response Underwriting</span>
      </div>
      <h1>Kidnap &amp; Ransom Exposure &amp; Underwriting Intelligence</h1>
      <p class="subtitle" id="subtitle-line"></p>
    </div>
  </div>

  <div class="tabs">
    <div class="tabs-inner" id="tabs-inner"></div>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
/* ======================================================================
   DESIGN TOKENS
====================================================================== */
const T = {
  bg:"#0A1728", bgPanel:"#0F2038", bgPanelAlt:"#13253F",
  line:"#233A57", lineSoft:"#1A2E4A",
  gold:"#C9A24B", goldBright:"#E8C877", goldDim:"#8A7238",
  text:"#EDE8DA", textMuted:"#8FA2BD", textFaint:"#5C7091",
  low:"#4C9A6A", moderate:"#D6A537", high:"#D97A34", critical:"#C0473F",
};

function bandForScore(score){
  if(score<=30) return {label:"Low", color:T.low};
  if(score<=60) return {label:"Moderate", color:T.moderate};
  if(score<=80) return {label:"High", color:T.high};
  return {label:"Critical", color:T.critical};
}

/* ======================================================================
   REFERENCE DATA — illustrative/synthetic only
====================================================================== */
const SECTORS = [
  { name:"Extractive – Oil, Gas & Mining",  sectorRisk:15, incidentProb:0.030, avgRansomBase:750000,  avgCaptivityDays:45, travelExposure:9 },
  { name:"NGO & Humanitarian",              sectorRisk:14, incidentProb:0.045, avgRansomBase:150000,  avgCaptivityDays:60, travelExposure:8 },
  { name:"Maritime & Shipping",             sectorRisk:13, incidentProb:0.025, avgRansomBase:2000000, avgCaptivityDays:90, travelExposure:7 },
  { name:"Journalism & Media",              sectorRisk:12, incidentProb:0.020, avgRansomBase:300000,  avgCaptivityDays:75, travelExposure:8 },
  { name:"Diplomatic & Government Contractors", sectorRisk:13, incidentProb:0.022, avgRansomBase:400000, avgCaptivityDays:40, travelExposure:8 },
  { name:"Engineering & Field Infrastructure", sectorRisk:11, incidentProb:0.018, avgRansomBase:500000, avgCaptivityDays:30, travelExposure:7 },
  { name:"Financial Services (Exec Travel)", sectorRisk:8,  incidentProb:0.006, avgRansomBase:1000000, avgCaptivityDays:14, travelExposure:4 },
  { name:"Technology & Telecoms (Emerging Mkts)", sectorRisk:9, incidentProb:0.010, avgRansomBase:350000, avgCaptivityDays:21, travelExposure:5 },
];

const LIMIT_BANDS = [
  { label:"Up to £1m",  base:3000,  mult:0.4 },
  { label:"£1m–£5m",    base:8000,  mult:1 },
  { label:"£5m–£15m",   base:20000, mult:2.5 },
  { label:"£15m+",      base:55000, mult:6 },
];

const WEIGHTS = {
  protectionDetail:0.15, crisisResponse:0.10, heat:0.10, travelTracking:0.10,
  priorIncidents:0.20, sectorRisk:0.15, travelFrequency:0.10, regionInstability:0.10,
};

/* ======================================================================
   SCORING ENGINE
====================================================================== */
function computeScore({protectionDetail, crisisResponse, heat, travelTracking, priorIncidents, sectorRisk, travelFrequency, regionInstability}){
  const protectionSub = protectionDetail ? 0 : 100;
  const crisisSub = crisisResponse ? 0 : 100;
  const heatSub = heat==="Yes" ? 0 : heat==="Partial" ? 50 : 100;
  const trackingSub = travelTracking ? 0 : 100;
  const incidentSub = priorIncidents===0 ? 0 : priorIncidents===1 ? 60 : 100;
  const sectorSub = (sectorRisk/15)*100;
  const freqSub = (travelFrequency/10)*100;
  const instabilitySub = (regionInstability/10)*100;
  const raw = WEIGHTS.protectionDetail*protectionSub + WEIGHTS.crisisResponse*crisisSub + WEIGHTS.heat*heatSub +
    WEIGHTS.travelTracking*trackingSub + WEIGHTS.priorIncidents*incidentSub + WEIGHTS.sectorRisk*sectorSub +
    WEIGHTS.travelFrequency*freqSub + WEIGHTS.regionInstability*instabilitySub;
  return Math.round(raw);
}
function computePremium(score, bandMult){ return Math.round(bandMult*(2200+320*score)); }
function computeRetention(score, bandLabel){
  const bandBase = {"Up to £1m":5000,"£1m–£5m":15000,"£5m–£15m":50000,"£15m+":150000}[bandLabel];
  const band = bandForScore(score).label;
  const mult = {Low:1, Moderate:1.5, High:2.5, Critical:4}[band];
  return Math.round(bandBase*mult);
}
function fmtGBP(n){ return "£" + Math.round(n).toLocaleString("en-GB"); }

/* ======================================================================
   SYNTHETIC PORTFOLIO (seeded)
====================================================================== */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed>>>15), 1 | seed);
    t = (t + Math.imul(t ^ (t>>>7), 61 | t)) ^ t;
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  };
}
function buildPortfolio(){
  const rand = mulberry32(41203);
  const policies = [];
  for(let i=0;i<100;i++){
    const sector = SECTORS[Math.floor(rand()*SECTORS.length)];
    const band = LIMIT_BANDS[Math.floor(rand()*LIMIT_BANDS.length)];
    const protectionDetail = rand()<0.45;
    const crisisResponse = rand()<0.55;
    const hRoll = rand();
    const heat = hRoll<0.30 ? "No" : hRoll<0.60 ? "Partial" : "Yes";
    const travelTracking = rand()<0.50;
    const iRoll = rand();
    const priorIncidents = iRoll<0.85 ? 0 : iRoll<0.96 ? 1 : 2;
    const travelFrequency = Math.floor(rand()*11);
    const regionInstability = Math.floor(rand()*11);
    const score = computeScore({protectionDetail, crisisResponse, heat, travelTracking, priorIncidents,
      sectorRisk:sector.sectorRisk, travelFrequency, regionInstability});
    const premium = computePremium(score, band.mult);
    const claimProb = Math.min(0.35, (score/100)*sector.incidentProb*1.5);
    const hadClaim = rand()<claimProb;
    const severity = hadClaim ? Math.round(sector.avgRansomBase*(0.4+(score/100)*1.3)*(0.6+rand()*0.8)) : 0;
    policies.push({ id:i+1, sector:sector.name, band:band.label, protectionDetail, crisisResponse, heat,
      travelTracking, priorIncidents, travelFrequency, regionInstability, score, premium, hadClaim, severity });
  }
  return policies;
}

function heatColor(value, min, max){
  const t = max>min ? (value-min)/(max-min) : 0;
  const stops = [[76,154,106],[214,165,55],[217,122,52],[192,71,63]];
  const idx = Math.min(stops.length-2, Math.floor(t*(stops.length-1)));
  const localT = t*(stops.length-1) - idx;
  const c1 = stops[idx], c2 = stops[idx+1];
  const c = c1.map((v,i)=>Math.round(v+(c2[i]-v)*localT));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

/* ======================================================================
   ICONS — small inline SVG set
====================================================================== */
const ICONS = {
  "alert-triangle": '<path d="M12 3 2 20h20z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="16.7" r="0.6" fill="currentColor" stroke="none"/>',
  "chevron-right": '<path d="M9 6l6 6-6 6"/>',
  "skull": '<path d="M12 2a8 8 0 0 0-8 8c0 3 1.5 5 3 6.5V19a1 1 0 0 0 1 1h1v2h2v-2h2v2h2v-2h1a1 1 0 0 0 1-1v-2.5c1.5-1.5 3-3.5 3-6.5a8 8 0 0 0-8-8z"/><circle cx="9" cy="10" r="1.4"/><circle cx="15" cy="10" r="1.4"/>',
  "dollar": '<circle cx="12" cy="12" r="9"/><path d="M12 6.5v11M15.2 9.3c0-1.4-1.4-2.3-3.2-2.3s-3.2 1-3.2 2.3 1.4 1.9 3.2 2.3 3.2 1 3.2 2.4-1.4 2.3-3.2 2.3-3.2-1-3.2-2.3"/>',
  "clock": '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.2 3.2"/>',
  "search": '<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/>',
  "arrows-ud": '<path d="M7 4v16"/><path d="M4 7l3-3 3 3"/><path d="M17 20V4"/><path d="M14 17l3 3 3-3"/>',
  "trend-up": '<path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/>',
  "trend-down": '<path d="M3 7l6 6 4-4 8 8"/><path d="M15 17h6v-6"/>',
  "minus": '<line x1="5" y1="12" x2="19" y2="12"/>',
  "rotate-ccw": '<path d="M3.5 12a8.5 8.5 0 1 0 2.8-6.3L3.5 8"/><path d="M3.5 3v5h5"/>',
  "building": '<rect x="4" y="2.5" width="16" height="19" rx="1"/><path d="M8.5 6.5h1M14.5 6.5h1M8.5 10.5h1M14.5 10.5h1M8.5 14.5h1M14.5 14.5h1M9.5 21.5v-3h5v3"/>',
  "x": '<line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/>',
  "user-check": '<circle cx="9" cy="8" r="4"/><path d="M2.5 21c0-4 3-6.5 6.5-6.5s5.4 1.5 6.2 3.8"/><path d="M16.5 12.5l2 2 4-4"/>',
  "phone-call": '<path d="M22 16.9v2a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.2 1h2a2 2 0 0 1 2 1.7c.1 1 .4 2.1.7 3.1a2 2 0 0 1-.5 2.1L7 9.3a16 16 0 0 0 6 6l1.4-1.4a2 2 0 0 1 2.1-.5c1 .3 2 .6 3.1.7a2 2 0 0 1 1.7 2z"/>',
  "eye": '<path d="M2 12s3.7-7 10-7 10 7 10 7-3.7 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  "grad-cap": '<path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1.5 3 3 6 3s6-1.5 6-3v-5"/><path d="M22 10v6"/>',
  "plane": '<path d="M12 2v20M12 2l6 8-6-2-6 2 6-8z"/><path d="M6 14l-3 5 3-1.2M18 14l3 5-3-1.2"/>',
  "globe": '<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.6 2.5 4 5.7 4 9s-1.4 6.5-4 9c-2.6-2.5-4-5.7-4-9s1.4-6.5 4-9z"/>',
  "shield-check": '<path d="M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5z"/><path d="m9 12 2 2 4-4"/>',
};
function icon(name, size=14, color="currentColor", extraStyle=""){
  const body = ICONS[name] || "";
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;${extraStyle}">${body}</svg>`;
}

/* ======================================================================
   RISK GAUGE (SVG)
====================================================================== */
function riskGaugeSVG(score){
  const band = bandForScore(score);
  const angle = -90 + (score/100)*180;
  const r = 70, cx = 90, cy = 90;
  const toXY = (deg)=>{ const rad = deg*Math.PI/180; return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)]; };
  const segs = [
    {from:-90, to:-36, color:T.low}, {from:-36, to:18, color:T.moderate},
    {from:18, to:54, color:T.high}, {from:54, to:90, color:T.critical},
  ];
  const arcPath = (from,to)=>{ const [x1,y1]=toXY(from), [x2,y2]=toXY(to); return `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2}`; };
  const [nx, ny] = toXY(angle);
  const arcs = segs.map(s=>`<path d="${arcPath(s.from,s.to)}" stroke="${s.color}" stroke-width="10" fill="none" opacity="0.85"/>`).join("");
  return `
  <div style="display:flex;flex-direction:column;align-items:center;">
    <svg width="180" height="112" viewBox="0 0 180 112">
      ${arcs}
      <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${T.goldBright}" stroke-width="2.5"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="${T.goldBright}"/>
    </svg>
    <div style="font-family:var(--mono);font-size:28px;font-weight:600;margin-top:-8px;color:${band.color};">${score}</div>
    <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:2px;color:${band.color};">${band.label} Risk</div>
  </div>`;
}

function deltaPillHTML(value, reference, goodDirection="down", decimals=0){
  const diff = value - reference;
  const pct = reference !== 0 ? (diff/reference)*100 : 0;
  const flat = Math.abs(diff) < 0.5;
  const better = goodDirection==="down" ? diff<0 : diff>0;
  const color = flat ? T.textFaint : better ? T.low : T.critical;
  const ic = flat ? "minus" : diff>0 ? "trend-up" : "trend-down";
  const txt = flat ? "on par" : `${diff>0?"+":""}${pct.toFixed(decimals)}%`;
  return `<span class="pill" style="color:${color};">${icon(ic,12,color)}${txt}</span>`;
}

function trafficLightHTML(level){
  const color = level==="Low" ? T.low : level==="Moderate" ? T.moderate : T.critical;
  return `<span class="traffic" style="color:${color};"><span class="dot" style="background:${color};"></span>${level} Exposure</span>`;
}

/* ======================================================================
   STATE
====================================================================== */
const portfolio = buildPortfolio();

function computeAgg(portfolio){
  const n = portfolio.length;
  const avgScore = portfolio.reduce((a,c)=>a+c.score,0)/n;
  const avgPremium = portfolio.reduce((a,c)=>a+c.premium,0)/n;
  const claimsCos = portfolio.filter(c=>c.hadClaim);
  const totalPremium = portfolio.reduce((a,c)=>a+c.premium,0);
  const totalIncurred = claimsCos.reduce((a,c)=>a+c.severity,0);
  const lossRatio = totalPremium ? totalIncurred/totalPremium : 0;
  const avgIncidentCost = claimsCos.length ? claimsCos.reduce((a,c)=>a+c.severity,0)/claimsCos.length : 0;

  const bySector = SECTORS.map(s=>{
    const cos = portfolio.filter(c=>c.sector===s.name);
    const avgS = cos.length ? cos.reduce((a,c)=>a+c.score,0)/cos.length : 0;
    const avgP = cos.length ? cos.reduce((a,c)=>a+c.premium,0)/cos.length : 0;
    const claims = cos.filter(c=>c.hadClaim);
    const freq = cos.length ? claims.length/cos.length : 0;
    const sev = claims.length ? claims.reduce((a,c)=>a+c.severity,0)/claims.length : 0;
    return { sector:s.name, avgScore:Math.round(avgS), avgScoreExact:avgS, avgPremium:avgP, freq, sev, count:cos.length, incidentProb:s.incidentProb };
  }).sort((a,b)=>b.avgScore-a.avgScore);

  const vulnCounts = [
    { label:"No Protection Detail", count:portfolio.filter(c=>!c.protectionDetail).length },
    { label:"No Crisis Response Retainer", count:portfolio.filter(c=>!c.crisisResponse).length },
    { label:"No HEAT Training", count:portfolio.filter(c=>c.heat!=="Yes").length },
    { label:"No Travel Tracking", count:portfolio.filter(c=>!c.travelTracking).length },
    { label:"Prior Incident(s)", count:portfolio.filter(c=>c.priorIncidents>0).length },
    { label:"High Travel Frequency", count:portfolio.filter(c=>c.travelFrequency>=6).length },
  ].sort((a,b)=>b.count-a.count);

  const bandCounts = ["Low","Moderate","High","Critical"].map(label=>({
    label, count: portfolio.filter(c=>bandForScore(c.score).label===label).length,
    color: {Low:T.low, Moderate:T.moderate, High:T.high, Critical:T.critical}[label],
  }));

  return { avgScore, avgPremium, avgIncidentCost, bySector, vulnCounts, bandCounts, totalClaims:claimsCos.length, lossRatio, totalPremium };
}

    </div>` : ""}
  `;

  document.getElementById("p-search").oninput = (e)=>{ state.pQuery = e.target.value; renderPortfolio(); document.getElementById("p-search").focus(); document.getElementById("p-search").setSelectionRange(e.target.value.length,e.target.value.length); };
  document.getElementById("p-sector").onchange = (e)=>{ state.pSectorFilter = e.target.value; renderPortfolio(); };
  content.querySelectorAll("[data-sort]").forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.sort;
      if(key===state.pSortKey) state.pSortDir = state.pSortDir==="desc"?"asc":"desc";
      else { state.pSortKey = key; state.pSortDir = "desc"; }
      renderPortfolio();
    };
  });
  content.querySelectorAll("tbody tr[data-id]").forEach(tr=>{
    tr.onclick = ()=>{ const id = Number(tr.dataset.id); state.pSelectedId = state.pSelectedId===id ? null : id; renderPortfolio(); };
  });
  const closeBtn = document.getElementById("p-close");
  if(closeBtn) closeBtn.onclick = ()=>{ state.pSelectedId = null; renderPortfolio(); };
}

function miniStat(label, ok, value){
  const color = value!==undefined && value!==null ? T.text : ok ? T.low : T.critical;
  const display = value!==undefined && value!==null ? value : (ok?"Yes":"No");
  return `<div class="ministat"><div class="lbl">${label}</div><div class="val" style="color:${color}">${display}</div></div>`;
}

/* ======================================================================
   INTERACTIVE ANIMATED BACKGROUND
   A drifting intelligence-network of nodes and connecting lines that
   brightens and reorients near the cursor — a quiet nod to signal
   tracking / surveillance-network themes of the dashboard.
====================================================================== */
(function backgroundNetwork(){
  const canvas = document.getElementById("bg-canvas");
  const ctx = canvas.getContext("2d");
  let w, h, dpr;
  let nodes = [];
  let pulses = [];
  const mouse = { x:-9999, y:-9999, active:false };
  let t = 0;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth; h = window.innerHeight;
    canvas.width = w*dpr; canvas.height = h*dpr;
    canvas.style.width = w+"px"; canvas.style.height = h+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const count = Math.max(32, Math.min(80, Math.round((w*h)/22000)));
    nodes = Array.from({length:count}, ()=>({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
      r: 1 + Math.random()*1.6,
      phase: Math.random()*Math.PI*2,
      wspeed: 0.0004 + Math.random()*0.0006,
      pulsePhase: Math.random()*Math.PI*2,
    }));
    pulses = [];
  }
  window.addEventListener("resize", resize);
  window.addEventListener("mousemove", (e)=>{ mouse.x=e.clientX; mouse.y=e.clientY; mouse.active=true; });
  window.addEventListener("mouseleave", ()=>{ mouse.active=false; });
  window.addEventListener("touchmove", (e)=>{ if(e.touches[0]){ mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY; mouse.active=true; } }, {passive:true});
  window.addEventListener("touchend", ()=>{ mouse.active=false; });

  const LINK_DIST = 155;
  const MOUSE_DIST = 220;

  function step(){
    t += 1;

    for(const n of nodes){
      // perpetual organic wander — a slowly-rotating force that never
      // fully decays, so the field is always drifting even at rest
      n.phase += n.wspeed;
      n.vx += Math.cos(n.phase) * 0.006;
      n.vy += Math.sin(n.phase*1.3) * 0.006;

      if(mouse.active){
        const dx = n.x - mouse.x, dy = n.y - mouse.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < MOUSE_DIST && dist > 0.01){
          const strength = 1 - dist/MOUSE_DIST;
          // gentle pull inward
          const pull = strength * 0.05;
          n.vx -= (dx/dist)*pull;
          n.vy -= (dy/dist)*pull;
          // tangential swirl around the cursor for a lively orbit feel
          const swirl = strength * 0.09;
          n.vx += (-dy/dist)*swirl;
          n.vy += (dx/dist)*swirl;
        }
      }

      // soft damping keeps speed bounded without ever fully stopping
      n.vx *= 0.978; n.vy *= 0.978;
      const speed = Math.sqrt(n.vx*n.vx+n.vy*n.vy);
      const maxSpeed = 0.9;
      if(speed > maxSpeed){ n.vx = (n.vx/speed)*maxSpeed; n.vy = (n.vy/speed)*maxSpeed; }

      n.x += n.vx; n.y += n.vy;
      if(n.x < -20) n.x = w+20; if(n.x > w+20) n.x = -20;
      if(n.y < -20) n.y = h+20; if(n.y > h+20) n.y = -20;
    }

    // occasionally launch a signal pulse along a currently-live connection
    if(Math.random() < 0.045 && nodes.length > 1){
      const a = nodes[Math.floor(Math.random()*nodes.length)];
      let best = null, bestDist = LINK_DIST;
      for(const b of nodes){
        if(b===a) continue;
        const d = Math.hypot(a.x-b.x, a.y-b.y);
        if(d < bestDist){ bestDist = d; best = b; }
      }
      if(best) pulses.push({ a, b:best, u:0, speed: 0.012 + Math.random()*0.012 });
    }
    pulses.forEach(p=>p.u += p.speed);
    pulses = pulses.filter(p=>p.u < 1);
  }

  function draw(){
    ctx.clearRect(0,0,w,h);

    // ambient slow-orbiting scan glow — keeps the field alive even
    // when the cursor is idle or off-screen
    const orbitR = Math.min(w,h) * 0.32;
    const ox = w/2 + Math.cos(t*0.0016) * orbitR;
    const oy = h/2 + Math.sin(t*0.0021) * orbitR * 0.7;
    const ambient = ctx.createRadialGradient(ox, oy, 0, ox, oy, 320);
    ambient.addColorStop(0, "rgba(201,162,75,0.055)");
    ambient.addColorStop(1, "rgba(201,162,75,0)");
    ctx.fillStyle = ambient;
    ctx.fillRect(0,0,w,h);

    // cursor glow
    if(mouse.active){
      const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 260);
      grad.addColorStop(0, "rgba(201,162,75,0.12)");
      grad.addColorStop(1, "rgba(201,162,75,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,w,h);
    }

    // connections
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a = nodes[i], b = nodes[j];
        const dx = a.x-b.x, dy = a.y-b.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if(dist < LINK_DIST){
          const nearMouseA = mouse.active ? Math.max(0, 1 - Math.hypot(a.x-mouse.x, a.y-mouse.y)/260) : 0;
          const nearMouseB = mouse.active ? Math.max(0, 1 - Math.hypot(b.x-mouse.x, b.y-mouse.y)/260) : 0;
          const glow = Math.max(nearMouseA, nearMouseB);
          const shimmer = 0.85 + 0.15*Math.sin(t*0.03 + i*0.7 + j*0.3);
          const baseAlpha = (1 - dist/LINK_DIST) * 0.17 * shimmer;
          const alpha = baseAlpha + glow*0.30;
          ctx.strokeStyle = glow > 0.05
            ? `rgba(232,200,119,${Math.min(0.5, alpha)})`
            : `rgba(143,162,189,${Math.min(0.35, alpha)})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
          ctx.stroke();
        }
      }
    }

    // traveling signal pulses along live connections
    for(const p of pulses){
      const x = p.a.x + (p.b.x-p.a.x)*p.u;
      const y = p.a.y + (p.b.y-p.a.y)*p.u;
      const fade = Math.sin(Math.PI * p.u); // fades in and out along the path
      ctx.beginPath();
      ctx.arc(x, y, 1.8, 0, Math.PI*2);
      ctx.fillStyle = `rgba(232,200,119,${0.7*fade})`;
      ctx.fill();
    }

    // nodes — gentle breathing pulse so they never look frozen
    for(const n of nodes){
      const nearMouse = mouse.active ? Math.max(0, 1 - Math.hypot(n.x-mouse.x, n.y-mouse.y)/260) : 0;
      const breathe = 1 + 0.25*Math.sin(t*0.045 + n.pulsePhase);
      ctx.beginPath();
      ctx.arc(n.x, n.y, (n.r*breathe) + nearMouse*1.5, 0, Math.PI*2);
      ctx.fillStyle = nearMouse > 0.05 ? `rgba(232,200,119,${0.5+nearMouse*0.5})` : "rgba(143,162,189,0.5)";
      ctx.fill();
    }
  }

  function loop(){
    step(); draw();
    requestAnimationFrame(loop);
  }

  resize();
  loop();
})();
</script>
